<div class="container py-5">

  <!-- Title + Create Button -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold mb-0">
      <i class="bi bi-calendar-check-fill text-success me-2"></i>
      Booking List
    </h3>

    <a routerLink="/booking/create"
       class="btn btn-success">
      <i class="bi bi-plus-circle me-1"></i>
      Create Booking
    </a>
  </div>

  <!-- Card Wrapper -->
  <div class="card shadow-sm border-0 rounded-4">
    <div class="card-body p-4">

      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">

          <thead class="table-light">
            <tr>
              <th><i class="bi bi-house-door-fill me-1"></i> Property</th>
              <th><i class="bi bi-123 me-1"></i> Plot</th>
              <th><i class="bi bi-person-fill me-1"></i> Customer</th>
              <th><i class="bi bi-calendar-event me-1"></i> Date</th>
              <th class="text-center">
                <i class="bi bi-gear-fill me-1"></i> Action
              </th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let b of bookings">

              <td>{{ b.propertyName }}</td>
              <td>{{ b.plotNo }}</td>
              <td>{{ b.customerName }}</td>
              <td>{{ b.bookingDate }}</td>

              <td class="text-center">

                <button (click)="edit(b.id)"
                        class="btn btn-warning btn-sm me-2">
                  <i class="bi bi-pencil-fill"></i>
                </button>

                <button (click)="delete(b.id)"
                        class="btn btn-danger btn-sm">
                  <i class="bi bi-trash-fill"></i>
                </button>

              </td>

            </tr>
          </tbody>

        </table>
      </div>

    </div>
  </div>

</div>
