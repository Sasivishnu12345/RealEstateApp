<div class="dashboard-wrapper">
  <div class="container">

    <!-- PAGE TITLE -->
    <div class="text-center mb-5">
      <h2 class="fw-bold text-dark">
        <i class="bi bi-buildings-fill text-primary me-2"></i>
        Real Estate Management
      </h2>
      <p class="text-muted">
        Manage properties and bookings efficiently
      </p>
    </div>

    <div class="row justify-content-center g-4">

      <!-- PROPERTY MANAGEMENT -->
      <div class="col-12 col-lg-6">
        <div class="card pro-card h-100 shadow-sm border-0">
          <div class="card-body">

            <div class="mb-3">
              <h5 class="fw-bold text-primary">
                <i class="bi bi-house-door-fill me-2"></i>
                Property Management
              </h5>
              <p class="text-muted mb-0">
                Add, view, update, and manage property listings.
              </p>
            </div>

            <div class="d-grid gap-2 mt-4">
              <a routerLink="/property/create"
                 class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>
                Add Property
              </a>

              <a routerLink="/property/list"
                 class="btn btn-outline-primary">
                <i class="bi bi-list-ul me-1"></i>
                View Properties
              </a>
            </div>

          </div>
        </div>
      </div>

      <!-- BOOKING MANAGEMENT -->
      <div class="col-12 col-lg-6">
        <div class="card pro-card h-100 shadow-sm border-0">
          <div class="card-body">

            <div class="mb-3">
              <h5 class="fw-bold text-success">
                <i class="bi bi-calendar-check-fill me-2"></i>
                Booking Management
              </h5>
              <p class="text-muted mb-0">
                Book properties and manage customer bookings.
              </p>
            </div>

            <div class="d-grid gap-2 mt-4">
              <a routerLink="/booking/create"
                 class="btn btn-success">
                <i class="bi bi-journal-plus me-1"></i>
                Book Property
              </a>

              <a routerLink="/booking/list"
                 class="btn btn-outline-success">
                <i class="bi bi-card-list me-1"></i>
                View Bookings
              </a>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>
