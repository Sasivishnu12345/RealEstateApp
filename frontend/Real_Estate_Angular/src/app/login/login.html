<div class="container-fluid vh-100 d-flex align-items-center justify-content-center login-bg">
  <div class="row w-100 m-0 justify-content-center">
    <div class="col-12 col-sm-8 col-md-6 col-lg-4">

      <div class="card shadow border-0 rounded-4 p-4 login-card">

        <!-- Title -->
        <div class="text-center mb-4">
          <i class="bi bi-buildings-fill text-primary fs-1"></i>
          <h3 class="mt-3 fw-bold">Real Estate Login</h3>
          <p class="text-muted mb-0">Welcome Back! Please login</p>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text bg-white">
              <i class="bi bi-envelope-fill text-primary"></i>
            </span>
            <input type="email"
                   class="form-control"
                   [(ngModel)]="email"
                   placeholder="Enter Email">
          </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <div class="input-group">
            <span class="input-group-text bg-white">
              <i class="bi bi-lock-fill text-primary"></i>
            </span>
            <input type="password"
                   class="form-control"
                   [(ngModel)]="password"
                   placeholder="Enter Password">
          </div>
        </div>

        <!-- Login Button -->
        <div class="d-grid mb-3">
          <button class="btn btn-primary btn-lg rounded-3" (click)="login()">
            <i class="bi bi-box-arrow-in-right me-1"></i>
            Login
          </button>
        </div>

        <!-- Error -->
        <p class="text-danger text-center small">{{errorMessage}}</p>

        <!-- Register -->
        <div class="text-center mt-3">
          <p class="mb-1">Don't have an account?</p>
          <a routerLink="/register" class="fw-semibold text-decoration-none">
            <i class="bi bi-person-plus-fill me-1"></i>
            Register Here
          </a>
        </div>

      </div>

    </div>
  </div>
</div>
